      // Redirect happens immediately.
      // We removed the timeout to make it as fast as possible.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1).join("/") +
          "/?/" +
          l.pathname

            .split("/")
            .slice(0)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.replace(/&/g, "~and~") : "") +
