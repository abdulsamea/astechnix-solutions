        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AStechnix - Redirecting...</title>

    <script type="text/javascript">
      // This script handles the GitHub Pages 404 redirect for Single Page Apps.
      // We use a timeout to ensure the FB Pixel PageView event fires before the redirect.
      setTimeout(function () {
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1).join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(0)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.replace(/&/g, "~and~") : "") +
            l.hash,
        );
      }, 300);
    </script>
